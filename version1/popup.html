<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rito Assistant</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 12px;
        width: 240px;
      }

      h1 {
        font-size: 18px;
        margin: 0 0 10px 0;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        margin-bottom: 10px;
      }

      button {
        width: 100%;
        padding: 8px;
        cursor: pointer;
      }

      #resultBox {
        margin-top: 10px;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        background: #f7f7f7;
        font-size: 12px;
        line-height: 1.4;
        min-height: 38px;
        white-space: pre-wrap;
      }

      #wakeIndicator {
        position: fixed;
        right: 12px;
        bottom: 52px;
        max-width: 220px;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(20, 20, 20, 0.92);
        color: #fff;
        font-size: 12px;
        line-height: 1.35;
        opacity: 0;
        transform: translateY(8px);
        transition:
          opacity 0.25s ease,
          transform 0.25s ease;
        pointer-events: none;
        z-index: 9999;
      }

      #wakeIndicator.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>
  <body>
    <h1>Rito</h1>
    <input id="commandInput" type="text" placeholder="Enter command" />
    <button id="runButton" type="button">Run</button>
    <button id="speakButton" type="button">🎤 Speak</button>
    <p id="speechStatus" aria-live="polite"></p>
    <p id="statusMessage" aria-live="polite"></p>
    <div id="resultBox">Results will appear here.</div>
    <div id="wakeIndicator">Listening...</div>

    <script src="popup.js"></script>
  </body>
</html>
